      - { label: "分类", name: "categories", widget: "list", default: ["新闻报道"] }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - { label: "轮播索引", name: "swiper_index", widget: "number", required: false, hint: "用于首页轮播排序，数字越小越靠前" }
      - { label: "封面图", name: "cover", widget: "image", required: false }

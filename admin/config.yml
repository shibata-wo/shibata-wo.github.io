      - { label: "分类", name: "categories", widget: "list", default: ["技术文件"] }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - { label: "正文", name: "body", widget: "markdown" }

  # ============================================
  # 4. 新闻报道
  # ============================================
  - name: news
    label: "新闻报道"
    label_singular: "文章"
    folder: source/_posts/新闻报道
    create: true
